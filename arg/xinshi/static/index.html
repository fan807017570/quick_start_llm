<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>新实招生顾问</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f4f1ec;
      --surface: #fffcf7;
      --border: #e2ddd4;
      --text: #1c1917;
      --muted: #78716c;
      --accent: #0d5c4a;
      --accent-soft: #d4ebe4;
      --user-bubble: #1a3d35;
      --shadow: 0 12px 40px rgba(28, 25, 23, 0.08);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Plus Jakarta Sans", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
    }
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 1.25rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .brand {
      font-family: "Instrument Serif", Georgia, serif;
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: -0.02em;
    }
    .brand span { font-style: italic; color: var(--muted); font-size: 0.85rem; display: block; margin-top: 0.25rem; }
    .btn-new {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 10px;
      padding: 0.65rem 1rem;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: 600;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-new:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
    .hint { font-size: 0.75rem; color: var(--muted); line-height: 1.45; margin-top: auto; }

    /* ── 文件上传面板 ──────────────────────────────── */
    .upload-section { border-top: 1px solid var(--border); padding-top: 0.9rem; }
    .upload-title {
      font-size: 0.78rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.6rem;
    }
    .upload-drop {
      border: 1.5px dashed var(--border);
      border-radius: 10px;
      padding: 0.9rem 0.75rem;
      text-align: center;
      font-size: 0.82rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      position: relative;
    }
    .upload-drop:hover, .upload-drop.dragover {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }
    .upload-drop input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .upload-drop .drop-icon { font-size: 1.4rem; display: block; margin-bottom: 0.25rem; }
    .upload-filename {
      font-size: 0.8rem;
      color: var(--text);
      margin-top: 0.45rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-height: 1.1em;
    }
    .upload-opts {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin: 0.5rem 0;
      font-size: 0.8rem;
      color: var(--muted);
    }
    .upload-opts input[type=checkbox] { accent-color: var(--accent); }
    .btn-upload {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.55rem;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: filter 0.15s;
    }
    .btn-upload:hover:not(:disabled) { filter: brightness(1.08); }
    .btn-upload:disabled { opacity: 0.45; cursor: not-allowed; }
    .upload-status {
      font-size: 0.78rem;
      margin-top: 0.45rem;
      min-height: 1.2em;
      line-height: 1.4;
      word-break: break-all;
    }
    .upload-status.ok  { color: var(--accent); }
    .upload-status.err { color: #c0392b; }
    /* ─────────────────────────────────────────────── */

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
    }
    .thread {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem 1.25rem 8rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .msg {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      animation: in 0.35s ease;
    }
    @keyframes in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 36px; height: 36px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .msg.user .avatar { background: var(--user-bubble); color: #fff; }
    .msg.assistant .avatar { background: var(--accent-soft); color: var(--accent); }
    .bubble {
      max-width: min(85%, 640px);
      padding: 0.9rem 1.1rem;
      border-radius: 14px;
      line-height: 1.65;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bubble);
      color: #fafaf9;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-bottom-left-radius: 4px;
    }
    .sources {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 0.5rem;
      padding-top: 0.5rem;
      border-top: 1px dashed var(--border);
    }
    .composer-wrap {
      position: fixed;
      bottom: 0;
      left: 260px;
      right: 0;
      padding: 0.75rem 1.25rem 1.25rem;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      pointer-events: none;
    }
    .composer-wrap > * { pointer-events: auto; }
    .composer {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      gap: 0.5rem;
      align-items: flex-end;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 0.5rem 0.65rem 0.5rem 1rem;
      box-shadow: var(--shadow);
    }
    textarea {
      flex: 1;
      border: none;
      resize: none;
      font-family: inherit;
      font-size: 0.95rem;
      line-height: 1.5;
      max-height: 160px;
      min-height: 44px;
      padding: 0.5rem 0;
      background: transparent;
      outline: none;
    }
    .btn-send {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0.55rem 1.1rem;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.9rem;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn-send:hover:not(:disabled) { filter: brightness(1.08); }
    .btn-send:disabled { opacity: 0.45; cursor: not-allowed; }
    .typing { color: var(--muted); font-style: italic; }
    @media (max-width: 720px) {
      .sidebar { display: none; }
      .composer-wrap { left: 0; }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">新实招生顾问<span>Xinshi Assistant</span></div>
    <button type="button" class="btn-new" id="btnNew">新对话</button>

    <div class="upload-section">
      <div class="upload-title">上传知识库文档</div>
      <div class="upload-drop" id="uploadDrop">
        <span class="drop-icon">📄</span>
        拖拽或点击选择文件<br/>
        <small>支持 .md / .txt，最大 10 MB</small>
        <input type="file" id="fileInput" accept=".md,.txt" />
      </div>
      <div class="upload-filename" id="uploadFilename"></div>
      <label class="upload-opts">
        <input type="checkbox" id="reindexCheck" />
        上传后立即重建向量索引
      </label>
      <button type="button" class="btn-upload" id="btnUpload" disabled>上传</button>
      <div class="upload-status" id="uploadStatus"></div>
    </div>

    <div class="upload-section">
      <div class="upload-title">知识库索引</div>
      <button type="button" class="btn-upload" id="btnReindex">重建向量索引</button>
      <div class="upload-status" id="reindexStatus"></div>
    </div>

    <p class="hint">回答基于校内知识库，仅供参考；招生政策以学校官方为准。</p>
  </aside>
  <main>
    <div class="thread" id="thread"></div>
  </main>
  <div class="composer-wrap">
    <form class="composer" id="form">
      <textarea id="input" rows="1" placeholder="输入您的问题…" autocomplete="off"></textarea>
      <button type="submit" class="btn-send" id="send">发送</button>
    </form>
  </div>
  <script>
    const thread = document.getElementById("thread");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const sendBtn = document.getElementById("send");
    const btnNew = document.getElementById("btnNew");
    /** 与后端 MAX_HISTORY_MESSAGES 一致，仅传最近若干轮 */
    const MAX_HISTORY = 12;
    let chatHistory = [];

    function addMessage(role, text, sources) {
      const wrap = document.createElement("div");
      wrap.className = "msg " + role;
      const av = document.createElement("div");
      av.className = "avatar";
      av.textContent = role === "user" ? "我" : "校";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      if (role === "assistant" && sources && sources.length) {
        const s = document.createElement("div");
        s.className = "sources";
        s.textContent = "参考章节：" + sources.filter(Boolean).join(" · ");
        bubble.appendChild(s);
      }
      wrap.appendChild(av);
      wrap.appendChild(bubble);
      thread.appendChild(wrap);
      thread.scrollTop = thread.scrollHeight;
    }

    function addTyping() {
      const wrap = document.createElement("div");
      wrap.className = "msg assistant";
      wrap.id = "typingRow";
      const av = document.createElement("div");
      av.className = "avatar";
      av.textContent = "校";
      const bubble = document.createElement("div");
      bubble.className = "bubble typing";
      bubble.textContent = "正在整理回答…";
      wrap.appendChild(av);
      wrap.appendChild(bubble);
      thread.appendChild(wrap);
      thread.scrollTop = thread.scrollHeight;
    }
    function removeTyping() {
      document.getElementById("typingRow")?.remove();
    }

    async function sendMessage(text) {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: text,
          history: chatHistory,
          use_rewrite: true,
        }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || res.statusText || "请求失败");
      return data;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      addMessage("user", text);
      sendBtn.disabled = true;
      addTyping();
      try {
        const data = await sendMessage(text);
        removeTyping();
        addMessage("assistant", data.answer || "", data.sources);
        chatHistory.push({ role: "user", content: text });
        chatHistory.push({ role: "assistant", content: data.answer || "" });
        if (chatHistory.length > MAX_HISTORY) {
          chatHistory = chatHistory.slice(-MAX_HISTORY);
        }
      } catch (err) {
        removeTyping();
        addMessage("assistant", "出错了：" + (err.message || String(err)));
      }
      sendBtn.disabled = false;
      input.focus();
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        form.requestSubmit();
      }
    });

    btnNew.addEventListener("click", () => {
      thread.innerHTML = "";
      chatHistory = [];
      input.focus();
      addMessage("assistant", "您好，我是新实中学招生顾问助手，可以问学校地址、办学规模、师资、校园生活等问题。");
    });

    addMessage("assistant", "您好，我是新实中学招生顾问助手，可以问学校地址、办学规模、师资、校园生活等问题。");

    /* ── 文件上传 ──────────────────────────────────────── */
    const fileInput    = document.getElementById("fileInput");
    const uploadDrop   = document.getElementById("uploadDrop");
    const uploadName   = document.getElementById("uploadFilename");
    const reindexCheck = document.getElementById("reindexCheck");
    const btnUpload    = document.getElementById("btnUpload");
    const uploadStatus = document.getElementById("uploadStatus");

    function setStatus(msg, type) {
      uploadStatus.textContent = msg;
      uploadStatus.className = "upload-status " + (type || "");
    }

    fileInput.addEventListener("change", () => {
      const f = fileInput.files[0];
      uploadName.textContent = f ? f.name : "";
      btnUpload.disabled = !f;
      setStatus("", "");
    });

    // 拖拽支持
    uploadDrop.addEventListener("dragover", (e) => { e.preventDefault(); uploadDrop.classList.add("dragover"); });
    uploadDrop.addEventListener("dragleave", () => uploadDrop.classList.remove("dragover"));
    uploadDrop.addEventListener("drop", (e) => {
      e.preventDefault();
      uploadDrop.classList.remove("dragover");
      const f = e.dataTransfer.files[0];
      if (!f) return;
      // 手动赋值给 input 以复用同一套逻辑
      const dt = new DataTransfer();
      dt.items.add(f);
      fileInput.files = dt.files;
      fileInput.dispatchEvent(new Event("change"));
    });

    btnUpload.addEventListener("click", async () => {
      const file = fileInput.files[0];
      if (!file) return;
      btnUpload.disabled = true;
      setStatus("上传中…", "");
      try {
        const fd = new FormData();
        fd.append("file", file);
        const reindex = reindexCheck.checked;
        const res = await fetch(`/api/docs/upload?reindex=${reindex}`, {
          method: "POST",
          body: fd,
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          setStatus("❌ " + (data.detail || res.statusText), "err");
        } else {
          let msg = `✅ 已保存：${data.saved}（${(data.bytes / 1024).toFixed(1)} KB）`;
          if (reindex) {
            msg += data.reindex_status === "ok"
              ? "，索引已重建"
              : `，索引重建失败：${data.reindex_status}`;
          }
          setStatus(msg, "ok");
          // 清空选择
          fileInput.value = "";
          uploadName.textContent = "";
        }
      } catch (err) {
        setStatus("❌ 网络错误：" + err.message, "err");
      }
      btnUpload.disabled = false;
    });
    /* ─────────────────────────────────────────────────── */

    /* ── 重建索引 ─────────────────────────────────────── */
    const btnReindex    = document.getElementById("btnReindex");
    const reindexStatus = document.getElementById("reindexStatus");
    let _pollTimer = null;

    function setReindexStatus(msg, type) {
      reindexStatus.textContent = msg;
      reindexStatus.className = "upload-status " + (type || "");
    }

    async function pollReindexStatus() {
      try {
        const res = await fetch("/api/docs/reindex/status");
        const data = await res.json();
        if (data.running) {
          setReindexStatus("⏳ 索引重建中…", "");
          _pollTimer = setTimeout(pollReindexStatus, 3000);
        } else {
          clearTimeout(_pollTimer);
          btnReindex.disabled = false;
          const r = data.last_result;
          if (!r) return;
          if (r.status === "ok") {
            setReindexStatus(`✅ 重建完成，耗时 ${r.elapsed_s}s`, "ok");
          } else {
            setReindexStatus(`❌ 重建失败：${r.detail}`, "err");
          }
        }
      } catch (e) {
        setReindexStatus("❌ 查询状态失败：" + e.message, "err");
        btnReindex.disabled = false;
      }
    }

    btnReindex.addEventListener("click", async () => {
      btnReindex.disabled = true;
      setReindexStatus("正在提交任务…", "");
      try {
        const res = await fetch("/api/docs/reindex", { method: "POST" });
        const data = await res.json();
        if (res.status === 409) {
          setReindexStatus("⚠️ " + data.detail, "");
          btnReindex.disabled = false;
          return;
        }
        if (!res.ok) {
          setReindexStatus("❌ " + (data.detail || res.statusText), "err");
          btnReindex.disabled = false;
          return;
        }
        setReindexStatus("⏳ 索引重建中…", "");
        _pollTimer = setTimeout(pollReindexStatus, 3000);
      } catch (e) {
        setReindexStatus("❌ 网络错误：" + e.message, "err");
        btnReindex.disabled = false;
      }
    });
    /* ─────────────────────────────────────────────────── */
  </script>
</body>
</html>
